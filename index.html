<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Default Module API Docs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui.min.css" />
  <style>
    body { margin: 0; background: #fafafa; }
    #swagger-ui .topbar { background-color: #1b1b1b; }
    #swagger-ui .topbar .download-url-wrapper { display: none; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-standalone-preset.min.js"></script>
  <script>
    const resolveServerUrl = () => {
      const params = new URLSearchParams(window.location.search);
      return params.get("server") || window.localStorage.getItem("swaggerServerUrl");
    };

    window.onload = async () => {
      const response = await fetch("./openapi.json");
      const spec = await response.json();
      const overrideServer = resolveServerUrl();

      if (overrideServer) {
        spec.servers = [
          { url: overrideServer, description: "Selected Server" },
          ...(spec.servers || []),
        ];
      }

      SwaggerUIBundle({
        spec,
        dom_id: "#swagger-ui",
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "StandaloneLayout",
        deepLinking: true,
        displayRequestDuration: true,
        tryItOutEnabled: true,
      });
    };
  </script>
</body>
</html>
